<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="40%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>

    <!-- Amber glow filter -->
    <filter id="amber-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="frame">
      <rect width="900" height="220" rx="8"/>
    </clipPath>

    <!-- Amber gradient for name -->
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="50%" style="stop-color:#FFCA6B"/>
      <stop offset="100%" style="stop-color:#F5A623"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="2" fill="rgba(0,0,0,0.08)"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(245,166,35,0.04)" stroke-width="0.5"/>
    </pattern>

    <!-- Corner accent gradient -->
    <radialGradient id="corner-glow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="corner-glow-r" cx="100%" cy="100%" r="60%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Base background -->
    <rect width="900" height="220" fill="url(#bg)"/>

    <!-- Grid overlay -->
    <rect width="900" height="220" fill="url(#grid)"/>

    <!-- Corner glows -->
    <rect width="900" height="220" fill="url(#corner-glow)"/>
    <rect width="900" height="220" fill="url(#corner-glow-r)"/>

    <!-- Scanlines -->
    <rect width="900" height="220" fill="url(#scanlines)" opacity="0.5"/>

    <!-- Animated horizontal line (sweeping) -->
    <line x1="0" y1="0" x2="900" y2="0" stroke="#F5A623" stroke-width="1.5" opacity="0.6">
      <animate attributeName="y1" from="0" to="220" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" from="0" to="220" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"/>
    </line>

    <!-- Decorative circuit lines - left -->
    <g opacity="0.25" stroke="#F5A623" stroke-width="0.8" fill="none">
      <polyline points="0,50 30,50 40,40 80,40"/>
      <circle cx="80" cy="40" r="2.5" fill="#F5A623"/>
      <polyline points="0,80 20,80 30,70 60,70"/>
      <circle cx="60" cy="70" r="2" fill="#F5A623"/>
      <polyline points="0,160 40,160 50,150 100,150"/>
      <circle cx="100" cy="150" r="2.5" fill="#F5A623"/>
      <polyline points="0,190 30,190 40,180 70,180"/>
      <circle cx="70" cy="180" r="2" fill="#F5A623"/>
    </g>

    <!-- Decorative circuit lines - right -->
    <g opacity="0.25" stroke="#F5A623" stroke-width="0.8" fill="none">
      <polyline points="900,50 870,50 860,40 820,40"/>
      <circle cx="820" cy="40" r="2.5" fill="#F5A623"/>
      <polyline points="900,80 880,80 870,70 840,70"/>
      <circle cx="840" cy="70" r="2" fill="#F5A623"/>
      <polyline points="900,160 860,160 850,150 800,150"/>
      <circle cx="800" cy="150" r="2.5" fill="#F5A623"/>
      <polyline points="900,190 870,190 860,180 830,180"/>
      <circle cx="830" cy="180" r="2" fill="#F5A623"/>
    </g>

    <!-- Top border line with animation -->
    <rect x="0" y="0" width="900" height="2" fill="#F5A623" opacity="0.5"/>
    <rect x="0" y="0" width="0" height="2" fill="url(#name-grad)">
      <animate attributeName="width" from="0" to="900" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>

    <!-- Bottom border -->
    <rect x="0" y="218" width="900" height="2" fill="#F5A623" opacity="0.2"/>

    <!-- Left vertical accent -->
    <rect x="0" y="0" width="3" height="220" fill="#F5A623" opacity="0.4"/>

    <!-- Right vertical accent -->
    <rect x="897" y="0" width="3" height="220" fill="#F5A623" opacity="0.15"/>

    <!-- Apple badge top-right -->
    <g transform="translate(808, 18)">
      <rect width="82" height="22" rx="3" fill="rgba(245,166,35,0.1)" stroke="#F5A623" stroke-width="0.5" opacity="0.8"/>
      <circle cx="10" cy="11" r="3" fill="#F5A623" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="19" y="15.5" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" fill="#F5A623" opacity="0.9" font-weight="600" letter-spacing="0.5">APPLE INTERN</text>
    </g>

    <!-- Status badge -->
    <g transform="translate(808, 48)">
      <rect width="82" height="22" rx="3" fill="rgba(57,217,138,0.08)" stroke="rgba(57,217,138,0.4)" stroke-width="0.5"/>
      <circle cx="10" cy="11" r="3" fill="#39D98A">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="19" y="15.5" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" fill="#39D98A" font-weight="600" letter-spacing="0.5">OPEN TO WORK</text>
    </g>

    <!-- SVNIT badge -->
    <g transform="translate(808, 78)">
      <rect width="82" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <text x="10" y="15.5" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">SVNIT · '26</text>
    </g>

    <!-- Main name - shadow layer -->
    <text x="60" y="108" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif" font-size="62" font-weight="900" fill="rgba(245,166,35,0.15)" letter-spacing="-1" filter="url(#soft-glow)">TANISH</text>
    <text x="60" y="163" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif" font-size="62" font-weight="900" fill="rgba(245,166,35,0.15)" letter-spacing="-1" filter="url(#soft-glow)">PANCHAL</text>

    <!-- Main name - amber gradient -->
    <text x="60" y="108" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif" font-size="62" font-weight="900" fill="url(#name-grad)" letter-spacing="-1" filter="url(#text-glow)" opacity="0">
      TANISH
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.8s" fill="freeze"/>
    </text>
    <text x="60" y="163" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif" font-size="62" font-weight="900" fill="url(#name-grad)" letter-spacing="-1" filter="url(#text-glow)" opacity="0">
      PANCHAL
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.8s" fill="freeze"/>
    </text>

    <!-- Subtitle -->
    <text x="62" y="188" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="2" opacity="0">
      SOFTWARE ENGINEER  ·  BACKEND  ·  FULL-STACK  ·  ML
      <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.8s" fill="freeze"/>
    </text>

    <!-- Decorative dots grid (bottom right area) -->
    <g opacity="0.12" fill="#F5A623">
      <circle cx="720" cy="120" r="1.5"/>
      <circle cx="740" cy="120" r="1.5"/>
      <circle cx="760" cy="120" r="1.5"/>
      <circle cx="720" cy="140" r="1.5"/>
      <circle cx="740" cy="140" r="1.5"/>
      <circle cx="760" cy="140" r="1.5"/>
      <circle cx="720" cy="160" r="1.5"/>
      <circle cx="740" cy="160" r="1.5"/>
      <circle cx="760" cy="160" r="1.5"/>
      <circle cx="780" cy="120" r="1.5"/>
      <circle cx="780" cy="140" r="1.5"/>
      <circle cx="780" cy="160" r="1.5"/>
    </g>

    <!-- Blinking cursor -->
    <rect x="62" y="194" width="8" height="2" fill="#F5A623">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
