<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="40%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="50%" style="stop-color:#FFD580"/>
      <stop offset="100%" style="stop-color:#F5A623"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="badge-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1200"/>
      <stop offset="100%" style="stop-color:#221800"/>
    </linearGradient>
    <linearGradient id="badge-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a0e"/>
      <stop offset="100%" style="stop-color:#002214"/>
    </linearGradient>
    <linearGradient id="badge-dim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(245,166,35,0.04)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="corner-glow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="frame"><rect width="900" height="220" rx="8"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Background -->
    <rect width="900" height="220" fill="url(#bg)"/>
    <rect width="900" height="220" fill="url(#grid)"/>
    <rect width="900" height="220" fill="url(#corner-glow)"/>

    <!-- Scanlines -->
    <rect width="900" height="220" fill="url(#scanlines)" opacity="0.3"/>

    <!-- Circuit lines left -->
    <g opacity="0.2" stroke="#F5A623" stroke-width="0.8" fill="none">
      <polyline points="0,50 30,50 40,40 80,40"/>
      <circle cx="80" cy="40" r="2.5" fill="#F5A623" opacity="0.8"/>
      <polyline points="0,80 20,80 30,70 60,70"/>
      <circle cx="60" cy="70" r="2" fill="#F5A623" opacity="0.8"/>
      <polyline points="0,160 40,160 50,150 100,150"/>
      <circle cx="100" cy="150" r="2.5" fill="#F5A623" opacity="0.8"/>
      <polyline points="0,190 30,190 40,180 70,180"/>
      <circle cx="70" cy="180" r="2" fill="#F5A623" opacity="0.8"/>
    </g>

    <!-- Circuit lines right -->
    <g opacity="0.2" stroke="#F5A623" stroke-width="0.8" fill="none">
      <polyline points="900,50 870,50 860,40 820,40"/>
      <circle cx="820" cy="40" r="2.5" fill="#F5A623" opacity="0.8"/>
      <polyline points="900,80 880,80 870,70 840,70"/>
      <circle cx="840" cy="70" r="2" fill="#F5A623" opacity="0.8"/>
      <polyline points="900,160 860,160 850,150 800,150"/>
      <circle cx="800" cy="150" r="2.5" fill="#F5A623" opacity="0.8"/>
    </g>

    <!-- Top amber border animated -->
    <rect x="0" y="0" width="900" height="2" fill="#F5A623" opacity="0.2"/>
    <rect x="0" y="0" width="0" height="2" fill="url(#name-grad)">
      <animate attributeName="width" from="0" to="900" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="0" y="218" width="900" height="2" fill="#F5A623" opacity="0.15"/>
    <rect x="0" y="0" width="3" height="220" fill="#F5A623" opacity="0.5"/>

    <!-- Sweep line -->
    <line x1="0" y1="0" x2="900" y2="0" stroke="#FFD580" stroke-width="1" opacity="0">
      <animate attributeName="y1" from="0" to="220" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" from="0" to="220" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.25;0" dur="4s" repeatCount="indefinite"/>
    </line>

    <!-- ── BADGES (right side) ── much more visible ── -->

    <!-- Badge 1: APPLE IS&T INTERN -->
    <g transform="translate(790, 20)">
      <rect width="102" height="28" rx="4" fill="url(#badge-amber)" stroke="#F5A623" stroke-width="1.2"/>
      <!-- left accent bar -->
      <rect width="4" height="28" rx="2" fill="#F5A623" opacity="0.9"/>
      <!-- dot -->
      <circle cx="15" cy="14" r="4" fill="#F5A623">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="r" values="4;3;4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="26" y="19" font-family="'Courier New', monospace" font-size="11" fill="#F5A623" font-weight="700" letter-spacing="0.8">APPLE IS&amp;T</text>
    </g>

    <!-- Badge 2: OPEN TO WORK -->
    <g transform="translate(790, 56)">
      <rect width="102" height="28" rx="4" fill="url(#badge-green)" stroke="#39D98A" stroke-width="1.2"/>
      <rect width="4" height="28" rx="2" fill="#39D98A" opacity="0.9"/>
      <circle cx="15" cy="14" r="4" fill="#39D98A">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="26" y="19" font-family="'Courier New', monospace" font-size="11" fill="#39D98A" font-weight="700" letter-spacing="0.8">OPEN TO WORK</text>
    </g>

    <!-- Badge 3: SVNIT '26 -->
    <g transform="translate(790, 92)">
      <rect width="102" height="28" rx="4" fill="url(#badge-dim)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <rect width="4" height="28" rx="2" fill="rgba(255,255,255,0.25)"/>
      <text x="13" y="19" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.75)" font-weight="600" letter-spacing="0.8">SVNIT CSE '26</text>
    </g>

    <!-- Badge 4: CGPA -->
    <g transform="translate(790, 128)">
      <rect width="102" height="28" rx="4" fill="url(#badge-dim)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <rect width="4" height="28" rx="2" fill="rgba(255,255,255,0.25)"/>
      <text x="13" y="19" font-family="'Courier New', monospace" font-size="11" fill="rgba(255,255,255,0.75)" font-weight="600" letter-spacing="0.8">CGPA  8.10/10</text>
    </g>

    <!-- Dot grid decoration -->
    <g opacity="0.15" fill="#F5A623">
      <circle cx="760" cy="170" r="1.5"/><circle cx="775" cy="170" r="1.5"/>
      <circle cx="760" cy="184" r="1.5"/><circle cx="775" cy="184" r="1.5"/>
      <circle cx="760" cy="198" r="1.5"/><circle cx="775" cy="198" r="1.5"/>
    </g>

    <!-- Name shadow -->
    <text x="60" y="105" font-family="'Arial Black', Arial, sans-serif" font-size="60" font-weight="900" fill="rgba(245,166,35,0.12)" letter-spacing="-1" filter="url(#soft-glow)">TANISH</text>
    <text x="60" y="162" font-family="'Arial Black', Arial, sans-serif" font-size="60" font-weight="900" fill="rgba(245,166,35,0.12)" letter-spacing="-1" filter="url(#soft-glow)">PANCHAL</text>

    <!-- Name amber -->
    <text x="60" y="105" font-family="'Arial Black', Arial, sans-serif" font-size="60" font-weight="900" fill="url(#name-grad)" letter-spacing="-1" filter="url(#text-glow)" opacity="0">
      TANISH
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.8s" fill="freeze"/>
    </text>
    <text x="60" y="162" font-family="'Arial Black', Arial, sans-serif" font-size="60" font-weight="900" fill="url(#name-grad)" letter-spacing="-1" filter="url(#text-glow)" opacity="0">
      PANCHAL
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.8s" fill="freeze"/>
    </text>

    <!-- Subtitle -->
    <text x="63" y="190" font-family="'Courier New', monospace" font-size="12.5" fill="rgba(255,255,255,0.45)" letter-spacing="2.5" opacity="0">
      SOFTWARE ENGINEER  ·  BACKEND  ·  FULL-STACK  ·  ML
      <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.7s" fill="freeze"/>
    </text>

    <!-- Blinking cursor -->
    <rect x="63" y="196" width="9" height="2.5" fill="#F5A623" opacity="0">
      <animate attributeName="opacity" values="0;0;1" begin="1.6s" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" begin="1.6s" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
